<svg width="680" height="240" viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect width="680" height="240" fill="#ffffff"/>

  <rect x="40" y="40" width="150" height="56" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
  <text x="115" y="62" text-anchor="middle" font-size="14" font-weight="600" fill="#2c2c2a">Raw email</text>
  <text x="115" y="80" text-anchor="middle" font-size="12" fill="#5f5e5a">headers, body, URLs</text>

  <rect x="250" y="40" width="180" height="56" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
  <text x="340" y="62" text-anchor="middle" font-size="14" font-weight="600" fill="#0c447c">IOC extractor</text>
