  <rect x="480" y="40" width="160" height="56" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="560" y="62" text-anchor="middle" font-size="14" font-weight="600" fill="#3c3489">Classifier</text>
  <text x="560" y="80" text-anchor="middle" font-size="12" fill="#534ab7">LLM or heuristic fallback</text>

  <line x1="430" y1="68" x2="478" y2="68" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="330" y="150" width="200" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="430" y="172" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Verdict + analyst report</text>
